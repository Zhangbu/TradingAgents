version: '3.8'

services:
  # TradingAgents API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradingagents-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ALPACA_PAPER=${ALPACA_PAPER:-true}
      - TRADING_MODE=${TRADING_MODE:-paper}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: tradingagents-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: PostgreSQL for production database
  postgres:
    image: postgres:15-alpine
    container_name: tradingagents-postgres
    environment:
      - POSTGRES_USER=trading
      - POSTGRES_PASSWORD=trading123
      - POSTGRES_DB=tradingagents
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - trading-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d tradingagents"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  trading-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data: