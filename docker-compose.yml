version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tradingagents-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/tradingagents.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
      - ./tradingagents:/app/tradingagents
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tradingagents-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
      - /app/frontend/.next
    depends_on:
      - backend
    restart: unless-stopped

  # Redis for caching and queuing (optional)
  redis:
    image: redis:7-alpine
    container_name: tradingagents-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # FutuOpenD Gateway (optional - for HK/US stock trading)
  # Uncomment when needed
  # futu-opend:
  #   image: futuopend/futuopend:latest
  #   container_name: tradingagents-futu
  #   ports:
  #     - "11111:11111"  # Futu OpenD port
  #   environment:
  #     - FUTU_HOST=0.0.0.0
  #     - FUTU_PORT=11111
  #   volumes:
  #     - futu_data:/data
  #   restart: unless-stopped

volumes:
  redis_data:
  # futu_data:

networks:
  default:
    name: tradingagents-network